<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung verfolgen · Pinocchio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#191512; --paper:#faf7f1; --tomato:#e2452b; --gray:#726c60; --line:#e7e0d1; --white:#fff; --green:#3f9d55; }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Manrope',sans-serif;}
  h1,h2{font-family:'Fraunces',serif; font-weight:700;}
  a{color:var(--tomato);}
  .nav{background:var(--ink); padding:16px clamp(18px,4vw,50px); display:flex; align-items:center; justify-content:space-between;}
  .nav a{color:#fff; text-decoration:none; font-family:'Fraunces',serif; font-weight:700;}
  main{max-width:640px; margin:0 auto; padding:50px clamp(18px,5vw,30px) 90px;}

  .lookup-box{background:var(--white); border:1px solid var(--line); border-radius:16px; padding:26px; text-align:center;}
  .lookup-box input{width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--line); font-size:16px; margin-top:14px; text-align:center; letter-spacing:1px;}
  .lookup-box button{width:100%; margin-top:14px; background:var(--tomato); color:#fff; border:none; padding:13px; border-radius:10px; font-weight:700; font-size:.95rem; cursor:pointer;}

  .card{background:var(--white); border:1px solid var(--line); border-radius:18px; padding:30px; margin-top:20px;}
  .order-head{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .order-num{font-family:'Fraunces',serif; font-weight:700; font-size:1.3rem;}
  .order-type{color:var(--gray); font-size:.85rem; margin-top:4px;}

  .steps{display:flex; justify-content:space-between; margin:36px 0 10px; position:relative;}
  .steps::before{content:""; position:absolute; top:17px; left:6%; right:6%; height:3px; background:var(--line); z-index:0;}
  .steps .progress-line{position:absolute; top:17px; left:6%; height:3px; background:var(--tomato); z-index:1; transition:width .4s;}
  .step{flex:1; text-align:center; position:relative; z-index:2;}
  .step .dot{width:36px; height:36px; border-radius:50%; background:var(--white); border:3px solid var(--line); display:flex; align-items:center; justify-content:center; margin:0 auto; font-size:1rem; transition:all .3s;}
  .step.done .dot{border-color:var(--tomato); background:var(--tomato); color:#fff;}
  .step.current .dot{border-color:var(--tomato); background:#fff; color:var(--tomato); box-shadow:0 0 0 5px rgba(226,69,43,.15);}
  .step .lbl{font-size:.72rem; font-weight:700; color:var(--gray); margin-top:8px; line-height:1.3;}
  .step.done .lbl, .step.current .lbl{color:var(--ink);}

  .status-banner{margin-top:26px; background:var(--paper); border-radius:12px; padding:16px 18px; text-align:center; font-weight:700;}
  .status-banner.cancelled{background:#fdeceb; color:var(--tomato);}
  .status-banner.completed{background:#e9f7ec; color:var(--green);}

  .items-box{margin-top:24px; border-top:1px solid var(--line); padding-top:18px;}
  .item-row{display:flex; justify-content:space-between; font-size:.9rem; padding:6px 0; color:#4a453a;}
  .total-row{display:flex; justify-content:space-between; font-weight:800; margin-top:10px; padding-top:10px; border-top:1px solid var(--line);}

  .error-box{background:#fdeceb; color:var(--tomato); border-radius:12px; padding:16px; text-align:center; margin-top:20px; font-weight:600;}
  .refresh-note{text-align:center; color:var(--gray); font-size:.76rem; margin-top:18px;}
  .call-note{text-align:center; margin-top:26px; font-size:.88rem; color:var(--gray);}
  .home-btn{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:22px;
    background:var(--ink); color:#fff; text-decoration:none; padding:14px; border-radius:12px; font-weight:700; font-size:.92rem;
  }
  .home-btn:hover{background:var(--tomato);}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html">🍕 Pinocchio</a>
  <a href="tel:+4924028644984" style="font-family:inherit; font-weight:600; font-size:.85rem;">📞 02402 86 44 984</a>
</nav>

<main>
  <div class="kicker" style="text-align:center; color:var(--tomato); text-transform:uppercase; letter-spacing:2px; font-size:.72rem; font-weight:800;">Bestellverfolgung</div>
  <h1 style="text-align:center; margin-top:8px;">Wo ist meine Bestellung?</h1>

  <div class="lookup-box" id="lookupBox">
    <p style="color:var(--gray); margin:0;">Gib deine Bestellnummer ein (steht auf deiner Bestätigung, z. B. PIN-260708-001).</p>
    <input type="text" id="orderInput" placeholder="PIN-260708-001">
    <button id="lookupBtn">Bestellung anzeigen</button>
  </div>

  <div id="resultWrap"></div>
</main>

<script>
// Muss zur Backend-Adresse in eurer index.html passen.
const API_BASE = "https://pinocchio-backend.onrender.com";

const STEP_DEFS = [
  { key: 'received', icon: '📥', label: 'Eingegangen' },
  { key: 'preparing', icon: '👨‍🍳', label: 'Wird zubereitet' },
  { key: 'ready', icon: '✅', label: 'Fertig' },
  { key: 'completed', icon: '🏁', label: 'Abgeschlossen' },
];

let pollTimer = null;

function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

async function lookupOrder(orderNumber) {
  const resultWrap = document.getElementById('resultWrap');
  try {
    const res = await fetch(`${API_BASE}/api/orders/${encodeURIComponent(orderNumber)}`);
    if (res.status === 404) {
      resultWrap.innerHTML = `<div class="error-box">Bestellung "${orderNumber}" wurde nicht gefunden. Bitte prüft die Nummer oder ruft uns an.</div><a href="index.html" class="home-btn">🏠 Zurück zur Startseite</a>`;
      return;
    }
    if (!res.ok) throw new Error('Serverfehler');
    const order = await res.json();
    renderOrder(order);

    // Automatisch alle 8 Sekunden aktualisieren, solange die Bestellung
    // noch läuft (nicht mehr nötig, sobald abgeschlossen/storniert).
    clearTimeout(pollTimer);
    if (!['completed', 'cancelled'].includes(order.status)) {
      pollTimer = setTimeout(() => lookupOrder(orderNumber), 8000);
    }
  } catch (err) {
    resultWrap.innerHTML = `<div class="error-box">Bestellung konnte nicht geladen werden. Bitte versucht es gleich nochmal oder ruft uns an.</div>${homeBtnHtml}`;
  }
}

const homeBtnHtml = `<a href="index.html" class="home-btn">🏠 Zurück zur Startseite</a>`;

function renderOrder(order) {
  const resultWrap = document.getElementById('resultWrap');
  document.getElementById('lookupBox').style.display = 'none';

  if (order.status === 'pending') {
    resultWrap.innerHTML = `
      <div class="card">
        <div class="order-head"><div class="order-num">${order.orderNumber}</div></div>
        <div class="status-banner">⏳ Zahlung wird noch verarbeitet — lade die Seite in einem Moment neu.</div>
      </div>
      ${homeBtnHtml}`;
    return;
  }

  if (order.status === 'cancelled') {
    resultWrap.innerHTML = `
      <div class="card">
        <div class="order-head"><div class="order-num">${order.orderNumber}</div></div>
        <div class="status-banner cancelled">❌ Diese Bestellung wurde storniert. Bei Fragen ruft uns gerne an.</div>
      </div>
      <div class="call-note">📞 <a href="tel:+4924028644984">02402 86 44 984</a></div>
      ${homeBtnHtml}`;
    return;
  }

  const currentIndex = STEP_DEFS.findIndex(s => s.key === order.status);
  const progressPct = currentIndex <= 0 ? 0 : (currentIndex / (STEP_DEFS.length - 1)) * 88;

  const stepsHtml = STEP_DEFS.map((s, i) => {
    let cls = '';
    if (i < currentIndex) cls = 'done';
    else if (i === currentIndex) cls = 'current';
    return `<div class="step ${cls}">
      <div class="dot">${i < currentIndex ? '✓' : s.icon}</div>
      <div class="lbl">${s.label}</div>
    </div>`;
  }).join('');

  const itemsHtml = order.items.map(it => `
    <div class="item-row"><span>${it.qty}× ${it.name}</span><span>${fmt(it.price * it.qty)}</span></div>
  `).join('');

  const typeLabel = order.type === 'lieferung' ? '🛵 Lieferung' : order.type === 'abholung' ? '🥡 Abholung' : '🍽️ Vor Ort';
  const bannerText = {
    received: '📥 Eure Bestellung ist bei uns eingegangen.',
    preparing: '👨‍🍳 Wird gerade frisch für euch zubereitet.',
    ready: order.type === 'lieferung' ? '🛵 Fertig — der Fahrer ist unterwegs zu euch!' : '✅ Fertig — ihr könnt sie abholen!',
    completed: '🎉 Abgeschlossen — guten Appetit!',
  }[order.status] || '';

  resultWrap.innerHTML = `
    <div class="card">
      <div class="order-head">
        <div>
          <div class="order-num">${order.orderNumber}</div>
          <div class="order-type">${typeLabel} · aufgegeben ${new Date(order.createdAt).toLocaleString('de-DE')}</div>
        </div>
      </div>

      <div class="steps">
        <div class="progress-line" style="width:${progressPct}%;"></div>
        ${stepsHtml}
      </div>

      <div class="status-banner ${order.status === 'completed' ? 'completed' : ''}">${bannerText}</div>

      <div class="items-box">
        ${itemsHtml}
        <div class="total-row"><span>Gesamt</span><span>${fmt(order.total)}</span></div>
      </div>
    </div>
    <p class="refresh-note">Diese Seite aktualisiert sich automatisch alle paar Sekunden.</p>
    <div class="call-note">Fragen zu eurer Bestellung? 📞 <a href="tel:+4924028644984">02402 86 44 984</a></div>
    ${homeBtnHtml}
  `;
}

document.getElementById('lookupBtn').addEventListener('click', () => {
  const val = document.getElementById('orderInput').value.trim();
  if (val) lookupOrder(val);
});
document.getElementById('orderInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('lookupBtn').click();
});

// Automatisch starten, falls die Bestellnummer schon in der URL steht
// (z.B. Link direkt nach der Bestellung: order-status.html?order=PIN-...)
(function initFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const orderNumber = params.get('order');
  if (orderNumber) {
    document.getElementById('orderInput').value = orderNumber;
    lookupOrder(orderNumber);
  }
})();
</script>
</body>
</html>
